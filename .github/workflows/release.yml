name: Release

# Publishes a GitHub Release whenever a version tag is pushed, matching the
# Improved Schematics format:
#   - tag:      vX.Y.Z
#   - name:     "Induced Demand vX.Y.Z"
#   - body:     the annotated tag message (your hand-written "What's new" notes),
#               falling back to auto-generated notes for a lightweight tag
#   - assets:   induced-demand-vX.Y.Z.zip  (index.js + manifest.json)
#               manifest.json              (standalone, for the mod manager)
#
# Cut a release with `npm run release` (drafts editable notes, then tags + pushes),
# or by hand:
#   git tag -a v1.0.0 -F RELEASE_NOTES.md
#   git push origin v1.0.0

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # `npm install` (not `npm ci`): npm ci strictly installs every platform-specific optional
        # dep in the lockfile (esbuild ships one per OS/CPU) and errors EBADPLATFORM on foreign ones;
        # npm install skips the incompatible optionals correctly.
        run: npm install --no-audit --no-fund

      - name: Verify tag matches package.json / manifest.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          MAN="$(node -p "require('./manifest.json').version")"
          echo "tag=$TAG package.json=$PKG manifest.json=$MAN"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$MAN" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json ($PKG) / manifest.json ($MAN)"
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build
        run: npx vite build

      - name: Package mod
        run: |
          cd dist
          zip -r "../induced-demand-${GITHUB_REF_NAME}.zip" index.js manifest.json

      - name: Extract release notes from tag
        id: notes
        run: |
          BODY="$(git tag -l --format='%(contents:body)' "$GITHUB_REF_NAME")"
          if [ -z "$BODY" ]; then
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<__RELEASE_NOTES_EOF__"
              echo "$BODY"
              echo "__RELEASE_NOTES_EOF__"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Induced Demand ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: ${{ steps.notes.outputs.has_notes == 'false' }}
          files: |
            induced-demand-${{ github.ref_name }}.zip
            manifest.json
